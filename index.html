<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #ui-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
            background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 12px; color: white;
            width: 90%; max-width: 300px; text-align: center;
        }
        /* Це вікно, де буде відео */
        #video-overlay {
            position: absolute;
            display: none;
            width: 300px; height: 170px;
            z-index: 10000;
            border: 2px solid white;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <input type="text" id="youtube-url" placeholder="Посилання YouTube" style="width:100%; padding:8px;">
        <button onclick="setupVideo()" style="width:100%; margin-top:5px; background:red; color:white; border:none; padding:10px;">Закріпити відео</button>
    </div>

    <!-- Вікно для відео -->
    <div id="video-overlay">
        <iframe id="yt-player" width="100%" height="100%" src="" frameborder="0"></iframe>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <!-- Маркер-мішень, який ми будемо відстежувати -->
        <a-entity id="anchor" position="0 1.6 -3"></a-entity>
        <a-camera look-controls></a-camera>
    </a-scene>

    <script>
        function setupVideo() {
            const url = document.getElementById('youtube-url').value;
            const videoId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
            if (!videoId) return alert('Помилка посилання');

            const overlay = document.getElementById('video-overlay');
            const player = document.getElementById('yt-player');
            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            overlay.style.display = 'block';
        }

        // Ця функція постійно прив'язує вікно з відео до 3D-координат
        function animate() {
            const anchor = document.querySelector('#anchor');
            const overlay = document.getElementById('video-overlay');
            
            // Отримуємо положення маркера на екрані
            const vector = new THREE.Vector3();
            anchor.object3D.getWorldPosition(vector);
            vector.project(document.querySelector('a-scene').camera);
            
            // Перетворюємо 3D координати в 2D (на екран)
            const x = (vector.x + 1) / 2 * window.innerWidth - 150;
            const y = -(vector.y - 1) / 2 * window.innerHeight - 85;
            
            overlay.style.left = x + 'px';
            overlay.style.top = y + 'px';
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
