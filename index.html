<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>YouTube AR на стіні</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ui-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        input, button {
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }
        input {
            background: #222;
            color: white;
        }
        button {
            background: #ff0000;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .instructions {
            color: #aaa;
            font-size: 12px;
            text-align: center;
            margin: 0;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="ui-container">
        <input type="text" id="youtube-url" placeholder="Встав посилання на YouTube...">
        <button onclick="updateVideo()">Закріпити на стіні</button>
        <p class="instructions">Поверни екран туди, де має бути "стіна", встав посилання і натисни кнопку.</p>
    </div>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity id="video-wall" position="0 1.6 -3" rotation="0 0 0">
            <a-plane id="video-screen" width="3" height="1.7" color="#111" material="shader: flat;">
                <a-text value="Тут з'явиться відео" align="center" color="#fff" width="4"></a-text>
            </a-plane>
        </a-entity>
        <a-entity camera look-controls></a-entity>
    </a-scene>
    <script>
        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
        function updateVideo() {
            const urlInput = document.getElementById('youtube-url').value;
            const videoId = extractVideoId(urlInput);
            if (!videoId) {
                alert('Будь ласка, встав коректне посилання на YouTube.');
                return;
            }
            const videoScreen = document.getElementById('video-screen');
            videoScreen.innerHTML = '';
            alert('Відео закріплено! Повертайся з телефоном — воно триматиметься на тій точці.');
            videoScreen.setAttribute('color', '#ff0000');
            const cameraEl = document.querySelector('[camera]');
            const wallEl = document.getElementById('video-wall');
            const currentRotation = cameraEl.getAttribute('rotation');
            wallEl.setAttribute('rotation', `0 ${currentRotation.y} 0`);
        }
    </script>
</body>
</html>
